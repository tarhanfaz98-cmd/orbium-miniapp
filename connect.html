<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Orbium VPN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#06070f;
    --cyan:#46e6ff; --blue:#5b8cff; --violet:#9a6bff; --magenta:#ff5db1; --green:#3ce6a6;
    --txt:#f3f5fc; --dim:#9aa2bd; --mut:#646c89;
    --glass:rgba(255,255,255,.045);
    --glass-2:rgba(255,255,255,.07);
    --hair:rgba(255,255,255,.10);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
    background:#03040a;color:var(--txt);min-height:100dvh;
    display:flex;align-items:center;justify-content:center;
    letter-spacing:-.01em;
  }
  .frame{position:relative;width:420px;height:910px;border-radius:30px;overflow:hidden;background:var(--bg);
    box-shadow:0 50px 130px rgba(0,0,0,.8);}
  @media (max-width:460px){.frame{width:100vw;height:100dvh;border-radius:0;box-shadow:none;}}

  .app{position:absolute;inset:0;display:flex;flex-direction:column;
    background:var(--bg);overflow:hidden;}
  .app::before{content:"";position:absolute;left:0;right:0;top:0;height:60%;z-index:0;
    background:url("ambient.png") top center / cover no-repeat;opacity:.82;
    -webkit-mask:linear-gradient(180deg,#000 55%,transparent);mask:linear-gradient(180deg,#000 55%,transparent);}
  /* legibility scrim behind hero text */
  .app .veil{position:absolute;left:0;right:0;top:0;height:240px;z-index:1;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 0%, rgba(3,4,10,.62), rgba(3,4,10,.18) 55%, transparent 75%);}
  /* connected ambient tint */
  .app.on::after{content:"";position:absolute;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity .6s;
    background:radial-gradient(80% 50% at 50% 26%, rgba(60,230,166,.16), transparent 70%);}
  .app.on.lit::after{opacity:1;}

  .scroll{position:relative;z-index:2;flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:calc(env(safe-area-inset-top,0px) + 20px) 22px calc(var(--safe-bot) + 104px);}

  /* header */
  .head{display:flex;align-items:center;gap:11px;margin-bottom:30px;}
  .orb{width:34px;height:34px;border-radius:50%;flex:0 0 auto;position:relative;
    background:radial-gradient(60% 60% at 36% 30%,#e2f2ff 0%,var(--cyan) 24%,var(--blue) 50%,var(--violet) 74%,#241a4e 100%);
    box-shadow:0 4px 14px rgba(91,140,255,.5),inset 0 1px 2px rgba(255,255,255,.6);}
  .orb::after{content:"";position:absolute;top:6px;left:9px;width:10px;height:5px;border-radius:50%;
    background:rgba(255,255,255,.7);filter:blur(.5px);transform:rotate(-20deg);}
  .wm{font-size:18px;font-weight:700;letter-spacing:.14em;}
  .head .grow{flex:1;}
  .iconbtn{width:40px;height:40px;border-radius:13px;border:1px solid var(--hair);background:var(--glass);
    display:grid;place-items:center;color:var(--dim);cursor:pointer;}
  .iconbtn svg{width:19px;height:19px;}

  /* hero status */
  .hero{display:flex;flex-direction:column;align-items:center;text-align:center;}
  .kicker{font-size:12.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#aeb6d4;text-shadow:0 1px 8px rgba(0,0,0,.6);}
  .status-word{font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:6px;
    background:linear-gradient(180deg,#fff,#c9d2ee);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .app.on .status-word{background:linear-gradient(180deg,#d6fff0,#5fe6b6);-webkit-background-clip:text;background-clip:text;color:transparent;}

  /* connect orb */
  .cwrap{position:relative;width:248px;height:248px;margin:30px 0 26px;display:grid;place-items:center;}
  .halo{position:absolute;width:300px;height:300px;border-radius:50%;
    background:radial-gradient(circle,rgba(91,140,255,.30),transparent 62%);filter:blur(14px);transition:.5s;}
  .app.on .halo{background:radial-gradient(circle,rgba(60,230,166,.32),transparent 62%);}
  .cbtn{position:relative;width:228px;height:228px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:grid;place-items:center;}
  .ring{position:absolute;inset:0;border-radius:50%;padding:3px;
    background:conic-gradient(from 0deg,var(--cyan),var(--blue),var(--violet),var(--magenta),var(--cyan));
    -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3px));
            mask:radial-gradient(farthest-side,transparent calc(100% - 4px),#000 calc(100% - 3px));
    filter:drop-shadow(0 0 16px rgba(91,140,255,.6));animation:spin 8s linear infinite;}
  .app.on .ring{background:conic-gradient(from 0deg,var(--green),var(--cyan),var(--green));filter:drop-shadow(0 0 18px rgba(60,230,166,.65));animation-duration:5s;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @media(prefers-reduced-motion:reduce){.ring{animation:none;}}
  /* dashed inner track */
  .track{position:absolute;inset:16px;border-radius:50%;border:1px dashed rgba(255,255,255,.10);}
  .core{position:absolute;inset:30px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
    background:radial-gradient(70% 70% at 42% 32%,rgba(91,140,255,.30),transparent 70%),radial-gradient(circle at 50% 60%,#10162e,#0a0e20 80%);
    border:1px solid rgba(255,255,255,.09);
    box-shadow:inset 0 2px 20px rgba(0,0,0,.6),inset 0 0 30px rgba(91,140,255,.10);transition:transform .14s ease;}
  .cbtn:active .core{transform:scale(.965);}
  .core .pwr{width:34px;height:34px;color:var(--cyan);filter:drop-shadow(0 0 8px rgba(70,230,255,.7));transition:.4s;}
  .app.on .core .pwr{color:var(--green);filter:drop-shadow(0 0 9px rgba(60,230,166,.8));}
  .core .lab{font-size:15px;font-weight:700;letter-spacing:.22em;color:#fff;}
  .core .sub{font-size:11px;font-weight:500;letter-spacing:.04em;color:var(--mut);}

  .secure{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:500;color:var(--dim);
    background:var(--glass);border:1px solid var(--hair);border-radius:999px;padding:7px 14px;margin-bottom:26px;}
  .secure svg{width:14px;height:14px;color:var(--green);}

  /* cards */
  .card{position:relative;border-radius:18px;background:var(--glass);border:1px solid var(--hair);
    box-shadow:0 14px 34px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.06);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);}
  .server{display:flex;align-items:center;gap:14px;padding:15px 16px;width:100%;cursor:pointer;border:none;
    background:var(--glass);border:1px solid var(--hair);border-radius:18px;color:inherit;text-align:left;
    box-shadow:0 14px 34px rgba(0,0,0,.34),inset 0 1px 0 rgba(255,255,255,.06);}
  .flag{width:44px;height:44px;border-radius:13px;flex:0 0 auto;display:grid;place-items:center;font-size:22px;
    background:linear-gradient(135deg,rgba(91,140,255,.22),rgba(154,107,255,.18));border:1px solid var(--hair);overflow:hidden;}
  .server .nm{flex:1;min-width:0;}
  .server .nm .t{font-size:15px;font-weight:600;}
  .server .nm .d{font-size:12.5px;color:var(--mut);margin-top:2px;display:flex;align-items:center;gap:6px;}
  .ping{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--green);font-variant-numeric:tabular-nums;}
  .ping .bars{display:flex;align-items:flex-end;gap:2px;height:14px;}
  .ping .bars i{width:3px;border-radius:1px;background:var(--green);}
  .ping .bars i:nth-child(1){height:5px;}.ping .bars i:nth-child(2){height:9px;}.ping .bars i:nth-child(3){height:14px;}
  .server .chev{color:var(--mut);}.server .chev svg{width:18px;height:18px;}

  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
  .tile{padding:15px 16px;}
  .tile .lab{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut);font-weight:500;}
  .tile .lab svg{width:15px;height:15px;}
  .tile .dl{color:var(--cyan);}.tile .ul{color:var(--violet);}
  .tile .val{font-size:22px;font-weight:700;margin-top:8px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;}
  .tile .val small{font-size:13px;font-weight:600;color:var(--mut);margin-left:3px;letter-spacing:0;}

  /* bottom nav */
  .nav{position:absolute;left:16px;right:16px;bottom:calc(var(--safe-bot) + 16px);z-index:6;height:68px;border-radius:22px;
    background:rgba(12,14,26,.78);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border:1px solid var(--hair);box-shadow:0 20px 48px rgba(0,0,0,.6);display:flex;padding:0 6px;}
  .nav button{flex:1;background:none;border:none;cursor:pointer;color:var(--mut);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;font-size:10.5px;font-weight:600;transition:color .15s;}
  .nav button svg{width:22px;height:22px;}
  .nav button.active{color:var(--cyan);}
  .nav button.active svg{filter:drop-shadow(0 0 6px rgba(70,230,255,.5));}
</style>
</head>
<body>
  <div class="frame">
    <div class="app" id="app">
      <div class="veil"></div>
      <div class="scroll">

        <header class="head">
          <div class="orb"></div>
          <div class="wm">ORBIUM</div>
          <div class="grow"></div>
          <button class="iconbtn" aria-label="Профиль">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          </button>
        </header>

        <section class="hero">
          <div class="kicker">Соединение</div>
          <div class="status-word" id="statusWord">Не защищено</div>

          <div class="cwrap">
            <div class="halo"></div>
            <button class="cbtn" id="cbtn" aria-label="Подключить VPN">
              <span class="ring"></span>
              <span class="track"></span>
              <span class="core">
                <svg class="pwr" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="2" x2="12" y2="12"/><path d="M18.4 6.6a9 9 0 1 1-12.8 0"/></svg>
                <span class="lab" id="coreLab">CONNECT</span>
                <span class="sub" id="coreSub">нажми, чтобы включить</span>
              </span>
            </button>
          </div>

          <div class="secure">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            VLESS + Reality · шифрование 256-бит
          </div>
        </section>

        <button class="server" id="serverBtn">
          <span class="flag">🇳🇱</span>
          <span class="nm">
            <span class="t">Нидерланды · Амстердам</span>
            <span class="d">Оптимальный сервер · нагрузка 18%</span>
          </span>
          <span class="ping">
            <span class="bars"><i></i><i></i><i></i></span>
            24<small style="font-weight:500;color:var(--mut)">ms</small>
          </span>
          <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></span>
        </button>

        <div class="tiles">
          <div class="card tile">
            <div class="lab"><svg class="dl" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>Загрузка</div>
            <div class="val" id="dl">0.0<small>Мбит/с</small></div>
          </div>
          <div class="card tile">
            <div class="lab"><svg class="ul" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>Отдача</div>
            <div class="val" id="ul">0.0<small>Мбит/с</small></div>
          </div>
        </div>

      </div>

      <nav class="nav">
        <button class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Главная</button>
        <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z"/></svg>Серверы</button>
        <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.6 13.4l-7.2 7.2a2 2 0 0 1-2.8 0L2 12V2h10l8.6 8.6a2 2 0 0 1 0 2.8z"/><line x1="7" y1="7" x2="7" y2="7"/></svg>Тарифы</button>
        <button><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg>Ещё</button>
      </nav>
    </div>
  </div>

<script>
  try{const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();}}catch(e){}
  const app=document.getElementById('app'),cbtn=document.getElementById('cbtn');
  const sw=document.getElementById('statusWord'),cl=document.getElementById('coreLab'),cs=document.getElementById('coreSub');
  const dl=document.getElementById('dl'),ul=document.getElementById('ul');
  let on=false,t=null;
  function rnd(a,b){return (a+Math.random()*(b-a));}
  function setOn(v){
    on=v;app.classList.toggle('on',v);
    requestAnimationFrame(()=>app.classList.toggle('lit',v));
    sw.textContent=v?'Защищено':'Не защищено';
    cl.textContent=v?'ON':'CONNECT';
    cs.textContent=v?'соединение активно':'нажми, чтобы включить';
    try{window.Telegram?.WebApp?.HapticFeedback?.impactOccurred(v?'medium':'light');}catch(e){}
    if(v){t=setInterval(()=>{dl.innerHTML=rnd(80,140).toFixed(1)+'<small>Мбит/с</small>';ul.innerHTML=rnd(20,55).toFixed(1)+'<small>Мбит/с</small>';},800);}
    else{clearInterval(t);dl.innerHTML='0.0<small>Мбит/с</small>';ul.innerHTML='0.0<small>Мбит/с</small>';}
  }
  cbtn.addEventListener('click',()=>setOn(!on));
</script>
</body>
</html>
